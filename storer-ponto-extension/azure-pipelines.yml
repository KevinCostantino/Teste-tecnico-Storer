trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Validate
    jobs:
      - job: LintAndTest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - script: npm run lint
            displayName: Run lint
          - script: npm run test:coverage
            displayName: Run tests with coverage
          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: 'coverage/lcov.info'
              codeCoverageTool: 'Cobertura'

  - stage: Build
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: BuildExtension
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - script: npm run build
            displayName: Build extension
          - script: cd dist && zip -r ../storer-ponto-extension.zip .
            displayName: Package extension
          - task: PublishBuildArtifacts@1
            inputs:
              pathtoPublish: 'storer-ponto-extension.zip'
              artifactName: 'storer-ponto-extension'
